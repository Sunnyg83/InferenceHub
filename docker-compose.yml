services:
  fastapi:
    build: .
    container_name: inferencehub-fastapi
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen3
      - REDIS_TTL_SECONDS=3600
      - SEMANTIC_THRESHOLD=0.90
      - RAG_TOP_K=5
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - EMBEDDING_DIM=384
    depends_on:
      - redis
      - qdrant
      - ollama
    networks:
      - inferencehub

  redis:
    image: redis:7-alpine
    container_name: inferencehub-redis
    ports:
      - "6379:6379"
    networks:
      - inferencehub

  qdrant:
    image: qdrant/qdrant:latest
    container_name: inferencehub-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - inferencehub

  ollama:
    image: ollama/ollama:latest
    container_name: inferencehub-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - inferencehub

  prometheus:
    image: prom/prometheus:latest
    container_name: inferencehub-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - fastapi
    networks:
      - inferencehub

  grafana:
    image: grafana/grafana:latest
    container_name: inferencehub-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - inferencehub

networks:
  inferencehub:
    driver: bridge

volumes:
  qdrant_data:
  ollama_data:
